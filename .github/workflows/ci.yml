name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      AUTH_SECRET: "placeholder-secret-for-ci-build-only-32-bytes"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build
